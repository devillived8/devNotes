<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>devNotes</title>
    <link
      rel="shortcut icon"
      href="./assets/images/icon.svg"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="wrapper wrapper--header">
        <a href="#"
          ><img src="./assets/images/icon.svg" alt="devNotes logotype"
        /></a>
        <nav class="nav">
          <ul class="nav__list">
            <li class="nav__list-element"><a class="nav__link" href="">Html</a></li>
            <li class="nav__list-element"><a class="nav__link" href="">Css</a></li>
            <li class="nav__list-element"><a class="nav__link" href="">Js</a></li>
            <li class="nav__list-element"><a class="nav__link" href="">Git</a></li>
            <li class="nav__list-element"><a class="nav__link" href="">Ts</a></li>
            <li class="nav__list-element"><a class="nav__link" href="">React</a></li>
          </ul>
        </nav>
      </div>
    </header>
    <main class="main">
      <div class="wrapper">
        <h1 class="title title--main">
          devNotes - заметки для front-end разработчика
        </h1>
        <div class="cards-grid">
          <article class="card">
            <a href="">
              <img
                src="./assets/images/html5.svg"
                alt="html logo"
                class="card__logo"
              />
            </a>
          </article>
          <article class="card">
            <a href="">
              <img
                src="./assets/images/css.svg"
                alt="html logo"
                class="card__logo"
              />
            </a>
          </article>
          <article class="card">
            <a href="">
              <img
                src="./assets/images/js.svg"
                alt="html logo"
                class="card__logo"
              />
            </a>
          </article>
          <article class="card">
            <a href="">
              <img
                src="./assets/images/github-icon.svg"
                alt="html logo"
                class="card__logo"
              />
            </a>
          </article>
          <article class="card">
            <a href="">
              <img
                src="./assets/images/logo-ts.svg"
                alt="html logo"
                class="card__logo"
              />
            </a>
          </article>
          <article class="card">
            <a href="">
              <img
                src="./assets/images/react.svg"
                alt="html logo"
                class="card__logo"
              />
            </a>
          </article>
        </div>
      </div>
    </main>
    <footer class="footer">
      <div class="wrapper wrapper--footer">
        <p class="footer__info">
          Проект сделан с учёбной целью. Для связи с создателем -
        </p>
        <a href="https://t.me/devillived8" target="_blank">
          <img
            class="footer__logo"
            src="./assets/images/telegram.svg"
            alt="telegram logo"
          />
        </a>
      </div>
    </footer>
  </body>
</html>
