<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Веб-сайт шпаргалка для фронт-енд разработчкиков, сделано с целью обучения на яндекс практикуме."
    />
    <link rel="icon" href="./assets/images/favicon.ico" sizes="any" />
    <link rel="icon" href="./assets/images/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./assets/images/apple-touch-icon.png" />
    <title>devNotes</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="wrapper wrapper--header">
        <a href="/"
          ><img
            class="logo"
            src="./assets/images/favicon.svg"
            alt="devNotes logotype"
        /></a>
        <nav class="nav">
          <ul class="nav__list">
            <li class="nav__list-element">
              <a class="nav__link" aria-label="Html" href="">Html</a>
            </li>
            <li class="nav__list-element">
              <a class="nav__link" aria-label="Css" href="">Css</a>
            </li>
            <li class="nav__list-element">
              <a class="nav__link" aria-label="Js" href="">Js</a>
            </li>
            <li class="nav__list-element">
              <a class="nav__link" aria-label="Github" href="">Github</a>
            </li>
            <li class="nav__list-element">
              <a class="nav__link" aria-label="Typescript" href="">Ts</a>
            </li>
            <li class="nav__list-element">
              <a class="nav__link" aria-label="React" href="">React</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>
    <main class="main">
      <div class="wrapper">
        <h1 class="title title--main">
          devNotes - заметки для front-end разработчика
        </h1>
        <div class="cards-grid">
          <article class="card">
            <a href="#" aria-label="Html документация">
              <img
                src="./assets/images/html5.svg"
                alt="Html logo"
                class="card__logo"
              />
            </a>
          </article>
          <article class="card">
            <a href="#" aria-label="Css документация">
              <img
                src="./assets/images/css.svg"
                alt="Css logo"
                class="card__logo"
              />
            </a>
          </article>
          <article class="card">
            <a href="#" aria-label="Javascript документация">
              <img
                src="./assets/images/js.svg"
                alt="Js logo"
                class="card__logo"
              />
            </a>
          </article>
          <article class="card">
            <a href="" aria-label="Github документация">
              <img
                src="./assets/images/github-icon.svg"
                alt="Github logo"
                class="card__logo"
              />
            </a>
          </article>
          <article class="card">
            <a href="#" aria-label="Typescript документация">
              <img
                src="./assets/images/logo-ts.svg"
                alt="Ts logo"
                class="card__logo"
              />
            </a>
          </article>
          <article class="card">
            <a href="#" aria-label="React документация">
              <img
                src="./assets/images/react.svg"
                alt="React logo"
                class="card__logo"
              />
            </a>
          </article>
        </div>
      </div>
    </main>
    <footer class="footer">
      <div class="wrapper wrapper--footer">
        <p class="footer__info">
          Проект сделан с учёбной целью. Для связи с создателем -
        </p>
        <a
          href="https://t.me/devillived8"
          aria-label="Связаться с создателем"
          target="_blank"
        >
          <img
            class="footer__logo"
            src="./assets/images/telegram.svg"
            alt="telegram logo"
          />
        </a>
      </div>
    </footer>
  </body>
</html>
